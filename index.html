<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play War Thunder now – the ultimate SEO Free Game with tanks, aircraft, and naval combat. Free to play, epic battles await!">
  <meta name="keywords" content="SEO Free Game, free-to-play game, War Thunder, online game, military combat, tanks, aircraft, naval combat, free-to-play MMO, join now">
  <meta property="og:title" content="Play War Thunder - Ultimate SEO Free Game with Tanks, Aircraft & Naval Combat | Free-to-Play">
  <meta property="og:description" content="War Thunder is the ultimate SEO free game offering tanks, aircraft, and naval combat. Join the action for free!">
  <meta property="og:image" content="path_to_image.jpg">
  <meta property="og:url" content="https://brightlane.github.io/warthunder.com/">
  <title>Play War Thunder - SEO Free Game | Free Tanks, Aircraft & Naval Combat!</title>
  <link rel="stylesheet" href="styles.min.css">
  <link rel="icon" href="favicon.ico">
  <script src="script.min.js" defer></script>

  <style>
    /* Global Styles */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* Exit Intent Popup */
    #exit-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    #exit-popup.active {
      opacity: 1;
    }

    #exit-popup .popup-content {
      background: #fff;
      padding: 20px;
      width: 25%; /* Reduced size */
      max-width: 400px;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.4s ease-out;
    }

    #exit-popup .popup-content h2 {
      color: #e74c3c;
      font-size: 1.8rem;
      margin-bottom: 20px;
      font-weight: bold;
    }

    #exit-popup .popup-content p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 30px;
    }

    #exit-popup .popup-content a {
      background-color: #e74c3c;
      color: #fff;
      padding: 12px 25px;
      font-size: 1.2rem;
      text-decoration: none;
      border-radius: 50px;
      transition: background-color 0.3s;
    }

    #exit-popup .popup-content a:hover {
      background-color: #c0392b;
    }

    /* Animation for the Popup */
    @keyframes slideUp {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <!-- Your page content here... -->

  <!-- Exit Intent Popup -->
  <div id="exit-popup">
    <div class="popup-content">
      <h2>Wait! Don't leave yet!</h2>
      <p><strong>You're about to miss out on the best free MMO game</strong> with tanks, aircraft, and naval combat. <br> Play War Thunder now and join the action for **FREE**!</p>
      <a href="https://brightlane.github.io/warthunder.com/">Start Playing FREE NOW!</a>
    </div>
  </div>

  <script>
    // Activate the exit popup when the mouse leaves the screen
    let exitPopup = document.getElementById('exit-popup');
    document.addEventListener('mouseout', function (e) {
      if (!e.relatedTarget && !e.toElement) {
        exitPopup.classList.add('active');
      }
    });

    // Close the popup when the user clicks it
    exitPopup.addEventListener('click', function() {
      exitPopup.classList.remove('active');
    });
  </script>

</body>

</html>
